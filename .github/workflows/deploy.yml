name: Deploy to GitHub Pages

# Build the Vite app and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-deploys from the Actions tab

# Least-privilege token: read the repo, write Pages, mint the deploy OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel an in-flight run if a newer push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --silent # the pure-core suite gates the deploy
      - run: npm run build # tsc --noEmit && vite build (base: /campeon/)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
